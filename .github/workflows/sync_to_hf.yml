- name: Install HuggingFace Hub + Xet
  run: pip install -U huggingface_hub hf_xet

- name: Upload to HuggingFace Space via CLI
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
  run: |
    huggingface-cli login --token $HF_TOKEN
    huggingface-cli upload ThripleT1912/SayarDesk-IELTS-Intelligence . . --repo-type space