name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4 to fix the Node.js warning
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'username' and 'spacename' with your actual HF info
          git push --force https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/ThripleT1912/SayarDesk-IELTS-Intelligence main