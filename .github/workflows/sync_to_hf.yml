name: Sync to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Remove large binary files before pushing to HF
        run: |
          find . -name "*.pt" -delete
          find . -name "*.bin" -delete
          find . -name "*.pkl" -delete
          find . -name "*.joblib" -delete
          find . -name "*.csv" -delete
          find . -name "*.pdf" -delete

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add hf https://ThripleT1912:$HF_TOKEN@huggingface.co/spaces/ThripleT1912/SayarDesk-IELTS-Intelligence
          git push hf main --force